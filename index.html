<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام إدارة المخابرات المركزية | CIA SYSTEM</title>
    <style>
        :root {
            --bg-color: #0d0f12;
            --panel-bg: #161a22;
            --accent-gold: #d4af37;
            --accent-red: #e74c3c;
            --accent-green: #2ecc71;
            --text-color: #e0e6ed;
            --border-color: #2c3240;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 950px;
            background-color: var(--panel-bg);
            border: 1px solid var(--border-color);
            border-top: 4px solid var(--accent-gold);
            border-radius: 8px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.8);
            padding: 30px;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 15px;
        }

        .header h1 {
            color: var(--accent-gold);
            font-size: 24px;
            letter-spacing: 1px;
            margin-bottom: 5px;
        }

        .header p {
            font-size: 13px;
            color: #8b949e;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            color: var(--accent-gold);
        }

        input, select {
            width: 100%;
            padding: 10px;
            background: #0d1117;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            color: #fff;
            font-size: 14px;
            outline: none;
        }

        input:focus, select:focus {
            border-color: var(--accent-gold);
        }

        button {
            padding: 10px 15px;
            background: var(--accent-gold);
            color: #000;
            font-weight: bold;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #b59228;
        }

        .btn-full {
            width: 100%;
        }

        .btn-danger {
            background: var(--accent-red);
            color: #fff;
        }

        .btn-danger:hover {
            background: #c0392b;
        }

        .btn-sm {
            padding: 6px 10px;
            font-size: 12px;
            width: auto;
        }

        .hidden {
            display: none;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        th, td {
            padding: 12px;
            text-align: right;
            border-bottom: 1px solid var(--border-color);
            font-size: 14px;
        }

        th {
            background-color: #0d1117;
            color: var(--accent-gold);
        }

        .badge {
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: bold;
            background: #21262d;
            color: var(--accent-gold);
            border: 1px solid var(--accent-gold);
        }

        .admin-box {
            background: #0d1117;
            border: 1px dashed var(--accent-gold);
            padding: 15px;
            border-radius: 6px;
            margin-bottom: 25px;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .action-flex {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .action-flex select {
            width: 180px;
            padding: 6px;
        }

        .error-msg {
            color: var(--accent-red);
            font-size: 13px;
            margin-top: 10px;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>🌐 نظام الاستخبارات العامة | CIA DATABASE</h1>
        <p>نظام إلكتروني سري لمتابعة وإدارة الرتب والعملاء (متصل أونلاين)</p>
    </div>

    <!-- 1. صفحة التسجيل والدخول -->
    <div id="login-section">
        <h2 style="margin-bottom: 15px; font-size: 18px;">تسجيل الدخول / إنشاء حساب عميل</h2>
        <form id="login-form">
            <div class="form-group">
                <label for="username">الاسم الكامل / الرمز:</label>
                <input type="text" id="username" placeholder="أدخل اسمك..." required>
            </div>
            <div class="form-group">
                <label for="password">كلمة السر الخاصة بك:</label>
                <input type="password" id="password" placeholder="أدخل كلمة السر..." required>
            </div>
            <div class="form-group">
                <label for="initial-rank">الرتبة الأولية عند التسجيل الجديد:</label>
                <select id="initial-rank" disabled>
                    <option value="مستجد" selected>مستجد</option>
                </select>
            </div>
            <button type="submit" class="btn-full">دخول / إنشاء حساب</button>
            <p id="login-error" class="error-msg"></p>
        </form>
    </div>

    <!-- 2. لوحة النظام الرئيسية -->
    <div id="dashboard-section" class="hidden">
        <div class="top-bar">
            <div>أهلاً بك العميل: <span id="current-user-display" style="color: var(--accent-gold); font-weight: bold;"></span> (<span id="current-rank-display" style="color: #fff;"></span>)</div>
            <button class="btn-danger btn-sm" onclick="logout()">تسجيل الخروج</button>
        </div>

        <!-- منطقة تفعيل وضع الأدمن -->
        <div class="admin-box" id="admin-box-container">
            <h3 style="font-size: 14px; margin-bottom: 10px; color: var(--accent-gold);">🔓 صلاحيات التعديل (إدخال الكود)</h3>
            <div style="display: flex; gap: 10px;">
                <input type="password" id="admin-code-input" placeholder="أدخل كود التفعيل لتعديل من هم أقل منك رتبة...">
                <button style="width: 150px;" onclick="unlockAdmin()">تفعيل</button>
            </div>
            <p id="admin-msg" style="font-size: 12px; margin-top: 5px;"></p>
        </div>

        <!-- قائمة العملاء والترقيات -->
        <h3>📋 سجل العملاء والرتب الحالية (مباشر أونلاين)</h3>
        <table>
            <thead>
                <tr>
                    <th>الاسم / الكود</th>
                    <th>الرتبة الحالية</th>
                    <th id="admin-actions-header" class="hidden">تعديل الرتبة / الإجراءات</th>
                </tr>
            </thead>
            <tbody id="agents-table-body">
                <!-- كايتزاد هنا بـ JS -->
            </tbody>
        </table>
    </div>
</div>

<!-- Firebase SDK Modules -->
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, set, get, child, onValue, remove } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    const firebaseConfig = {
        databaseURL: "https://cia-system-default-rtdb.firebaseio.com"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    const RANKS = [
        "مستجد",
        "جندي",
        "جندي اول",
        "عريف",
        "وكيل رقيب",
        "رقيب",
        "رقيب اول",
        "رئيس رقباء",
        "ملازم",
        "ملازم اول",
        "نقيب",
        "رائد",
        "مقدم",
        "عقيد",
        "عميد",
        "فريق",
        "فريق اول",
        "مستشار رئيس الاستخبارات",
        "نائب رئيس الاستخبارات",
        "قائد الاستخبارات"
    ];

    const ADMIN_SECRET = "ciaontop";
    let isCodeUnlocked = false;
    let currentUser = null;
    let globalAgents = [];

    const agentsRef = ref(db, 'agents');
    onValue(agentsRef, (snapshot) => {
        const data = snapshot.val();
        globalAgents = [];
        if (data) {
            Object.keys(data).forEach(key => {
                globalAgents.push({ id: key, ...data[key] });
            });
        }
        renderTable();
    });

    document.getElementById('login-form').addEventListener('submit', async function(e) {
        e.preventDefault();
        const name = document.getElementById('username').value.trim();
        const pass = document.getElementById('password').value.trim();
        const errorMsg = document.getElementById('login-error');
        errorMsg.innerText = '';

        if (!name || !pass) return;

        const userKey = name.toLowerCase().replace(/[^a-z0-9]/g, "_");
        const userRef = child(ref(db), `agents/${userKey}`);

        try {
            const snapshot = await get(userRef);
            if (snapshot.exists()) {
                const userData = snapshot.val();
                if (userData.password === pass) {
                    currentUser = { id: userKey, ...userData };
                    showDashboard();
                } else {
                    errorMsg.innerText = "✕ كلمة السر غير صحيحة لهذا الاسم!";
                }
            } else {
                const newUser = { name: name, password: pass, rank: "مستجد" };
                await set(ref(db, `agents/${userKey}`), newUser);
                currentUser = { id: userKey, ...newUser };
                showDashboard();
            }
        } catch (err) {
            errorMsg.innerText = "حدث خطأ في الاتصال بالسيرفر!";
        }
    });

    function showDashboard() {
        document.getElementById('login-section').classList.add('hidden');
        document.getElementById('dashboard-section').classList.remove('hidden');
        document.getElementById('current-user-display').innerText = currentUser.name;
        document.getElementById('current-rank-display').innerText = currentUser.rank;
        
        // إذا كان قائد الاستخبارات أو نائبه، يتفعل بدون كود
        if (currentUser.rank === "قائد الاستخبارات" || currentUser.rank === "نائب رئيس الاستخبارات") {
            isCodeUnlocked = true;
            document.getElementById('admin-box-container').style.display = "none";
            document.getElementById('admin-actions-header').classList.remove('hidden');
        }

        renderTable();
    }

    window.unlockAdmin = function() {
        const inputCode = document.getElementById('admin-code-input').value;
        const msg = document.getElementById('admin-msg');

        if (inputCode === ADMIN_SECRET) {
            isCodeUnlocked = true;
            msg.style.color = "var(--accent-green)";
            msg.innerText = "✓ تم التفعيل! يمكنك الآن ترقية/تعديل من هم أقل منك رتبة.";
            document.getElementById('admin-actions-header').classList.remove('hidden');
            renderTable();
        } else {
            msg.style.color = "var(--accent-red)";
            msg.innerText = "✕ كود السر غير صحيح!";
        }
    };

    function renderTable() {
        const tbody = document.getElementById('agents-table-body');
        if (!tbody || !currentUser) return;
        tbody.innerHTML = '';

        const myRankIndex = RANKS.indexOf(currentUser.rank);

        globalAgents.forEach((agent) => {
            const tr = document.createElement('tr');
            const targetRankIndex = RANKS.indexOf(agent.rank);

            let actionsHTML = '';

            // كاين الصلاحية للتعديل غير إذا كان مدخل الكود (أو قائد) وَ الشخص المستهدف رتبته أقل قطعا من رتبة المستخدم الحالي
            if (isCodeUnlocked && myRankIndex > targetRankIndex) {
                // خيارات الترقيات المتاحة هي فقط الرتب التي تكون أقل من رتبة العميل الحالي
                let allowedRanks = RANKS.slice(0, myRankIndex);
                let optionsHTML = allowedRanks.map(r => `<option value="${r}" ${r === agent.rank ? 'selected' : ''}>${r}</option>`).join('');

                actionsHTML = `
                    <td>
                        <div class="action-flex">
                            <select id="rank-select-${agent.id}">
                                ${optionsHTML}
                            </select>
                            <button class="btn-sm" onclick="setDirectRank('${agent.id}')">تطبيق</button>
                            <button class="btn-sm btn-danger" style="background:#555;" onclick="deleteAgent('${agent.id}')">🗑️ طرد</button>
                        </div>
                    </td>
                `;
            } else if (isCodeUnlocked) {
                actionsHTML = `<td><span style="font-size:11px; color:#777;">(رتبة أعلى منك/مساوية)</span></td>`;
            } else {
                actionsHTML = `<td class="hidden"></td>`;
            }

            tr.innerHTML = `
                <td><strong>${agent.name}</strong></td>
                <td><span class="badge">${agent.rank}</span></td>
                ${actionsHTML}
            `;
            tbody.appendChild(tr);
        });
    }

    window.setDirectRank = function(agentId) {
        const select = document.getElementById(`rank-select-${agentId}`);
        const selectedRank = select.value;
        set(ref(db, `agents/${agentId}/rank`), selectedRank);
    };

    window.deleteAgent = function(agentId) {
        if (confirm("هل أنت تأكد من طرد هذا العميل من القاعدة؟")) {
            remove(ref(db, `agents/${agentId}`));
        }
    };

    window.logout = function() {
        isCodeUnlocked = false;
        currentUser = null;
        document.getElementById('password').value = '';
        document.getElementById('login-error').innerText = '';
        document.getElementById('admin-code-input').value = '';
        document.getElementById('admin-msg').innerText = '';
        document.getElementById('admin-box-container').style.display = "block";
        document.getElementById('admin-actions-header').classList.add('hidden');
        document.getElementById('dashboard-section').classList.add('hidden');
        document.getElementById('login-section').classList.remove('hidden');
    };
</script>

</body>
</html>
